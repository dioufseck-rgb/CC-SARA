# ─────────────────────────────────────────────────────────────────────────────
# Coordinator config — SARA Binary
#
# Modeled on prior-auth-appeal/coordinator_config.yaml. Tier behavior tuned
# for the SARA domain: GATE is for cases the system itself flags as
# ambiguous, HOLD is for structural failures (hallucinated subsections,
# determinations that contradict their own internal checks).
# ─────────────────────────────────────────────────────────────────────────────

workflow_dir: workflows
domain_dir: domains

governance_tiers:
  auto:
    hitl: none
    sample_rate: 0.0
  spot_check:
    hitl: post_completion
    sample_rate: 0.10
    queue: quality_review
    sla: 3600
  gate:
    hitl: before_act
    queue: tax_analyst_review
    sla: 86400
  hold:
    hitl: before_finalize
    queue: compliance
    sla: 172800

quality_gates:
  # Minimum confidence below which any primitive's output is treated as
  # unreliable and the case auto-escalates to GATE.
  min_confidence: 0.5
  primitive_floors:
    # Investigate is the load-bearing reasoning step on SARA. If it can't
    # report ≥0.60 confidence in its rule-application, escalate.
    investigate: 0.60
    # Verify is the anti-hallucination check. If it can't determine
    # conformance with reasonable confidence, escalate.
    verify: 0.60
    # Generate produces the final determination. Low confidence here means
    # the system itself is uncertain about its output.
    generate: 0.55
  escalation_tier: gate
  escalation_queue: tax_analyst_review
  exempt_domains: []

delegations: []
contracts: {}
capabilities: []
overrides: {}
