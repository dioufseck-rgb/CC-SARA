# ─────────────────────────────────────────────────────────────────────────────
# Cognitive Core — LLM Configuration
#
# This file is the single source of truth for model names and provider settings.
# Edit this file when models are deprecated or you want to use different models.
# Never hardcode model names in application code.
#
# Override any value without editing this file:
#   LLM_DEFAULT_MODEL=<model>     override the default model
#   LLM_PROVIDER=<provider>       override the provider
#   LLM_CONFIG_PATH=<path>        load a different config file entirely
# ─────────────────────────────────────────────────────────────────────────────

# ── Provider ──────────────────────────────────────────────────────────────────
# Leave null to auto-detect from API key environment variables.
default_provider: null


# ── Model aliases ─────────────────────────────────────────────────────────────
# Maps logical alias → provider → model name.
# Workflows reference aliases ("default", "fast", "standard", "strong").
# Changing a model here updates all workflows that use that alias.
#
# UPDATED 2026-05-12 for SARA pack:
#   - Replaced gemini-3-flash-preview (unavailable on user's tier) with
#     gemini-2.5-flash (default/fast) and gemini-2.5-pro (standard/strong).
#   - Long-context reasoning steps (investigate, verify, challenge) now route
#     to 'standard' via primitive_model_alias to avoid Flash's truncation
#     behavior on 30KB+ prompts.
aliases:
  default:
    anthropic:    claude-haiku-4-5-20251001
    google:       gemini-2.5-flash
    openai:       gpt-4o-mini
    azure:        gpt-4o-mini
    azure_foundry: gpt-4o-mini
    bedrock:      anthropic.claude-3-5-haiku-20241022-v1:0

  fast:
    anthropic:    claude-haiku-4-5-20251001
    google:       gemini-2.5-flash-lite
    openai:       gpt-4o-mini
    azure:        gpt-4o-mini
    azure_foundry: gpt-4o-mini
    bedrock:      anthropic.claude-3-5-haiku-20241022-v1:0

  standard:
    anthropic:    claude-sonnet-4-6
    google:       gemini-2.5-pro
    openai:       gpt-4o
    azure:        gpt-4o
    azure_foundry: gpt-4o
    bedrock:      anthropic.claude-3-5-sonnet-20241022-v2:0

  strong:
    anthropic:    claude-sonnet-4-6
    google:       gemini-2.5-pro
    openai:       gpt-4o
    azure:        gpt-4o
    azure_foundry: gpt-4o
    bedrock:      anthropic.claude-3-5-sonnet-20241022-v2:0


# ── Model → provider lookup ───────────────────────────────────────────────────
model_to_provider:
