# ── Provider settings ─────────────────────────────────────────────────────────
provider_settings:
  google:
    # temperature: 0.7
    # top_p: 0.95
    # max_output_tokens: 8192
  openai:
    # timeout: 60
  azure:
    # api_version: "2024-08-01-preview"


# ── Per-primitive output token budgets ────────────────────────────────────────
# Controls max_tokens (Anthropic/OpenAI) / max_output_tokens (Google) per call.
# Heavy primitives (deliberate, reflect, govern, generate, challenge) produce
# large JSON schemas with multiple list fields — they need real headroom.
# Light primitives (retrieve, classify, verify) are structurally bounded.
primitive_max_tokens:
  retrieve:    4096
  classify:    4096
  investigate: 8192
  verify:      6144
  deliberate:  8192
  reflect:     8192
  generate:    8192
  challenge:   8192
  govern:      6144


# ── Per-primitive model alias overrides ───────────────────────────────────────
# UPDATED for SARA: investigate, verify, challenge route to 'standard'
# (gemini-2.5-pro on google). These primitives ingest 30KB+ prompts when the
# raw statute corpus is inlined via ${input.statute_corpus}, and Flash-class
# models truncate their structured JSON output on inputs of that size.
# Pro handles long-context faithfully.
#
# Light primitives (retrieve, classify, generate, govern) stay on 'default'
# (Flash) for speed; their prompts are shorter and don't hit the truncation
# threshold.
primitive_model_alias:
  classify:    standard
  verify:      standard
  challenge:   standard
  investigate: standard